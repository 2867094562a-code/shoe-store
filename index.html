<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>校园鞋店管理系统 - HyperOS Security+</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        
        :root { --mi-primary: #4f46e5; --mi-bg: #f2f5f8; }
        body { font-family: 'Inter', sans-serif; background-color: var(--mi-bg); overflow-x: hidden; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        .glass-sidebar { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border-right: 1px solid rgba(255, 255, 255, 0.5); }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.8); box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @media (min-width: 768px) { .glass-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.1); } }
        ::-webkit-scrollbar { width: 0px; height: 0px; background: transparent; }
        
        .page-enter { animation: slideIn 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        @keyframes slideIn { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .active-nav-pc { background: var(--mi-primary) !important; color: white !important; box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3); }
        .active-nav-mobile { color: var(--mi-primary) !important; font-weight: 900; }
        .active-nav-mobile svg { stroke-width: 3; transform: translateY(-2px); transition: all 0.3s; }
        
        input, select { transition: all 0.3s ease; }
        input:focus, select:focus { background: white !important; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15) !important; outline: none; }
        
        .lock-pulse { animation: lockPulse 2.5s infinite ease-in-out; }
        @keyframes lockPulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.85; box-shadow: 0 0 40px rgba(79, 70, 229, 0.4); } 100% { transform: scale(1); opacity: 1; } }
        
        .scale-in-center { animation: scaleInCenter 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        @keyframes scaleInCenter { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        #appWrapper { display: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen text-slate-900">

    <div id="customToast" class="fixed top-12 left-1/2 -translate-x-1/2 z-[10000] bg-slate-800/90 backdrop-blur-md text-white px-6 py-3.5 rounded-full shadow-2xl font-bold text-sm transition-all duration-300 opacity-0 pointer-events-none translate-y-[-20px] whitespace-nowrap">
        提示内容
    </div>

    <div id="customDialog" class="fixed inset-0 z-[10000] bg-slate-900/60 backdrop-blur-sm items-center justify-center p-6 hidden">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl scale-in-center">
            <h3 class="text-xl md:text-2xl font-black mb-3" id="dialogTitle">提示</h3>
            <p class="text-slate-500 text-sm md:text-base font-medium mb-6 leading-relaxed whitespace-pre-line" id="dialogMessage">内容</p>
            <input type="text" id="dialogInput" class="w-full bg-slate-50 px-5 py-4 rounded-2xl border-none outline-none focus:ring-2 focus:ring-indigo-500/20 font-bold text-sm mb-8 hidden" placeholder="请输入...">
            <div class="flex space-x-3 md:space-x-4">
                <button onclick="closeDialog()" class="flex-1 py-3.5 md:py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold hover:bg-slate-200 transition-all text-sm md:text-base active:scale-95">取消</button>
                <button onclick="executeDialogConfirm()" class="flex-1 py-3.5 md:py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all text-sm md:text-base active:scale-95">确认</button>
            </div>
        </div>
    </div>
    
    <div id="lockScreen" class="fixed inset-0 z-[9999] bg-slate-950 flex items-center justify-center overflow-hidden">
        <div class="absolute top-[-10%] left-[-20%] w-[400px] h-[400px] md:w-[600px] md:h-[600px] bg-indigo-600/30 rounded-full blur-[100px] md:blur-[120px]"></div>
        <div class="relative z-10 w-full max-w-md p-8 md:p-12 text-center">
            <div class="w-20 h-20 md:w-24 md:h-24 bg-indigo-600 rounded-[1.5rem] md:rounded-[2rem] flex items-center justify-center text-white mx-auto mb-8 md:mb-10 shadow-2xl lock-pulse text-4xl md:text-5xl dynamic-sys-logo">👟</div>
            <h1 class="text-2xl md:text-3xl font-black text-white mb-2 tracking-tight dynamic-sys-title">鞋店对账系统</h1>
            <p class="text-slate-400 mb-8 md:mb-10 text-xs md:text-sm">请输入管理密码解锁系统</p>
            <input type="password" id="pwdInput" placeholder="••••••" class="w-full bg-slate-900 text-white border border-slate-800 rounded-2xl md:rounded-3xl py-4 md:py-5 text-center text-2xl md:text-3xl tracking-[0.5em] focus:ring-4 focus:ring-indigo-500/30 outline-none mb-6">
            <button onclick="checkUnlock()" class="w-full py-4 md:py-5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl md:rounded-3xl font-black text-base md:text-lg transition-all active:scale-95 shadow-xl shadow-indigo-600/20">解锁进入</button>
        </div>
    </div>

                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 9.36l-7.1 7.1a2.12 2.12 0 0 1-3-3l7.1-7.1a6 6 0 0 1 9.36-7.94l-3.6 3.6z"/></svg>

                <button onclick="switchView('memo')" id="pc-btn-memo" class="nav-btn-pc w-full flex items-center space-x-3 px-5 py-4 rounded-2xl transition-all duration-300 text-slate-500 hover:bg-white/60">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                    <span class="font-bold text-sm tracking-tight">备忘录</span>

                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            </button>
        </div>

        <nav class="md:hidden fixed bottom-0 left-0 w-full glass-card border-t border-slate-200/50 flex overflow-x-auto hide-scrollbar items-center pt-2 pb-safe z-40 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.05)] px-2 space-x-2" style="-webkit-overflow-scrolling: touch;">
            <button onclick="switchView('dashboard')" id="m-btn-dashboard" class="nav-btn-m flex-shrink-0 min-w-[60px] flex flex-col items-center py-2 text-slate-400 active-nav-mobile">

    <!-- 记一笔 弹窗 -->
    <div id="addModal" class="fixed inset-0 z-[500] bg-slate-900/60 backdrop-blur-md items-end md:items-center justify-center p-0 md:p-8 hidden">
        <div class="bg-white w-full md:max-w-2xl rounded-t-[2.5rem] md:rounded-[4rem] p-6 md:p-12 shadow-2xl space-y-6 md:space-y-10 border-t md:border border-white max-h-[90vh] overflow-y-auto page-enter pb-safe">
            <div class="flex justify-between items-start sticky top-0 bg-white z-10 pb-2">
                <div>
                    <h3 id="modalTitle" class="text-2xl md:text-4xl font-black tracking-tighter mb-1 md:mb-2">记录销售订单</h3>
                    <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest">Transaction Entry</p>
                </div>
                <button onclick="closeModal()" class="w-10 h-10 md:w-14 md:h-14 bg-slate-100 text-slate-400 rounded-full md:rounded-3xl flex items-center justify-center hover:bg-rose-50 hover:text-rose-500 transition-all active:scale-90">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>
            
            <div class="space-y-5 md:space-y-8">
                <div class="grid grid-cols-2 gap-4 md:gap-8">
                    <div class="space-y-1.5 md:space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">接待</label>
                        <select id="f-staff" class="w-full bg-slate-50 px-4 py-3.5 md:px-8 md:py-5 rounded-2xl md:rounded-3xl border-none outline-none focus:ring-4 focus:ring-indigo-500/10 font-bold text-sm md:text-lg"></select>
                    </div>
                    <div class="space-y-1.5 md:space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">对账</label>
                        <select id="f-auditor" class="w-full bg-slate-50 px-4 py-3.5 md:px-8 md:py-5 rounded-2xl md:rounded-3xl border-none outline-none focus:ring-4 focus:ring-indigo-500/10 font-bold text-sm md:text-lg"></select>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-8">
                    <div class="space-y-1.5 md:space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">鞋款型号 (自动带出价格)</label>
                        <select id="f-shoe" onchange="handleShoeSelection(this.value)" class="w-full bg-slate-50 px-4 py-3.5 md:px-8 md:py-5 rounded-2xl md:rounded-3xl border-none outline-none focus:ring-4 focus:ring-indigo-500/10 font-bold text-sm md:text-lg"></select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1.5 md:space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">颜色</label>
                            <input id="f-color" type="text" placeholder="例如：纯白" class="w-full bg-slate-50 px-5 py-4 md:px-8 md:py-5 rounded-2xl md:rounded-3xl border-none focus:ring-4 focus:ring-indigo-500/10 font-bold text-base md:text-lg">
                        </div>
                        <div class="space-y-1.5 md:space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">客户姓名</label>
                            <input id="f-client" type="text" placeholder="如：张三" class="w-full bg-slate-50 px-5 py-4 md:px-8 md:py-5 rounded-2xl md:rounded-3xl border-none focus:ring-4 focus:ring-indigo-500/10 font-bold text-base md:text-lg">
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 md:gap-8">
                    <div class="space-y-1.5 md:space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">成交价 (¥) <span class="text-indigo-400 font-normal lowercase tracking-normal ml-1">可手动修改</span></label>
                        <input id="f-price" type="number" placeholder="自动带出, 可修改" class="w-full bg-slate-50 px-4 py-4 md:px-8 md:py-5 rounded-2xl md:rounded-3xl border-none focus:ring-4 focus:ring-indigo-500/10 font-black text-xl md:text-2xl text-indigo-600">
                    </div>
                    <div class="space-y-1.5 md:space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">成本价 (¥) <span class="text-indigo-400 font-normal lowercase tracking-normal ml-1">可手动修改</span></label>
                        <input id="f-cost" type="number" placeholder="自动带出, 可修改" class="w-full bg-slate-50 px-4 py-4 md:px-8 md:py-5 rounded-2xl md:rounded-3xl border-none focus:ring-4 focus:ring-indigo-500/10 font-black text-xl md:text-2xl text-slate-400">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-8">
                    <div class="space-y-1.5 md:space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">快递单号</label>
                        <input id="f-tracking" type="text" placeholder="暂无单号" class="w-full bg-slate-50 px-5 py-4 md:px-8 md:py-5 rounded-2xl md:rounded-3xl border-none focus:ring-4 focus:ring-indigo-500/10 font-bold text-sm md:text-lg text-indigo-600 font-mono">
                    </div>
                    <div class="space-y-1.5 md:space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">备注信息</label>
                        <input id="f-remark" type="text" placeholder="例如：加急、送袜..." class="w-full bg-slate-50 px-5 py-4 md:px-8 md:py-5 rounded-2xl md:rounded-3xl border-none focus:ring-4 focus:ring-indigo-500/10 font-bold text-sm md:text-lg">
                    </div>
                </div>
                <button onclick="saveOrder()" class="w-full bg-indigo-600 py-4 md:py-6 mt-4 text-white font-black text-lg md:text-xl rounded-2xl md:rounded-[2rem] shadow-xl shadow-indigo-100 flex items-center justify-center space-x-2 md:space-x-4 active:scale-95 transition-all">
                    <span>确认保存并入库</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        let _g = {};

        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        let activeConfirmCallback = null;

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return String(unsafe)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function getLocalDateStr(dateObj = new Date()) {
            const year = dateObj.getFullYear();
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const day = String(dateObj.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function showToast(msg) {
            const toast = document.getElementById('customToast');
            toast.innerText = msg;
            toast.style.opacity = '1';
            toast.style.transform = isMobile ? 'translate(-50%, 20px)' : 'translate(-50%, 0)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, -20px)';
            }, 3000);
        }

        function showConfirm(title, msg, callback) {
            document.getElementById('dialogTitle').innerText = title;
            document.getElementById('dialogMessage').innerText = msg;
            document.getElementById('dialogInput').classList.add('hidden');
            activeConfirmCallback = callback; 
            const dialog = document.getElementById('customDialog');
            dialog.classList.remove('hidden');
            dialog.classList.add('flex');
        }

        function showPrompt(title, msg, placeholder, callback) {
            document.getElementById('dialogTitle').innerText = title;
            document.getElementById('dialogMessage').innerText = msg;
            const inputEl = document.getElementById('dialogInput');
            inputEl.classList.remove('hidden');
            inputEl.placeholder = placeholder;
            inputEl.value = "";
            
            activeConfirmCallback = () => {
                callback(inputEl.value.trim());
            }; 
            
            const dialog = document.getElementById('customDialog');
            dialog.classList.remove('hidden');
            dialog.classList.add('flex');
            setTimeout(() => inputEl.focus(), 100);
        }

        function closeDialog() {
            const dialog = document.getElementById('customDialog');
            dialog.classList.add('hidden');
            dialog.classList.remove('flex');
            activeConfirmCallback = null;
        }

        function executeDialogConfirm() {
            if (activeConfirmCallback) activeConfirmCallback();
            closeDialog();
        }

        function copyGistId() {
            const id = document.getElementById('set-gist-id').value;
            if(id) {
                const el = document.createElement('textarea');
                el.value = id;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                showToast("✅ 数据仓 ID 已复制，请通过微信发到手机上填入");
            }
        }

        function applyBranding() {
            const titleEls = document.querySelectorAll('.dynamic-sys-title');
            titleEls.forEach(el => el.innerText = sysTitle);
            const logoEls = document.querySelectorAll('.dynamic-sys-logo');
            logoEls.forEach(el => el.innerText = sysLogo);
            document.title = `${sysTitle} - HyperOS Security+`;
        }

        async function hashPassword(pwd) {
            if (!pwd) return "";
            let hash = 0;
            for (let i = 0; i < pwd.length; i++) {
                const char = pwd.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash; 
            }
            return "hyper_sec_" + Math.abs(hash).toString(36);
        }

        let sysTitle = localStorage.getItem('sec_sys_title') || '校园鞋店系统';
        let sysLogo = localStorage.getItem('sec_sys_logo') || '👟';
        
        let savedStaff = JSON.parse(localStorage.getItem('sec_staff'));
        let staffList = (savedStaff && savedStaff.length > 0) ? savedStaff : ['老板'];
        
        let savedBrands = JSON.parse(localStorage.getItem('sec_brands'));
        let brandList = savedBrands || ['默认厂牌', '玩觅', '库林'];

        let savedInventory = JSON.parse(localStorage.getItem('sec_inventory'));
        let inventoryList = savedInventory || [];

        let savedAftersales = JSON.parse(localStorage.getItem('sec_aftersales'));
        let aftersalesList = savedAftersales || [];

        let savedMemos = JSON.parse(localStorage.getItem('sec_memos'));
        let memoList = savedMemos || [];

        if (inventoryList.length === 0) {
            let oldShoeList = JSON.parse(localStorage.getItem('sec_shoes'));
            if (oldShoeList && oldShoeList.length > 0) {
                inventoryList = oldShoeList.map((name, index) => ({
                    id: 'INV' + Date.now() + index, brand: '默认厂牌', name: name, stock: 0, cost: 0, price: 0
                }));
            } else {
                inventoryList = [
                    { id: 'INV1', brand: '默认厂牌', name: '空军一号', stock: 2, cost: 85, price: 168 },
                    { id: 'INV2', brand: '玩觅', name: '全地形跑鞋', stock: 1, cost: 120, price: 258 }
                ];
            }
            localStorage.setItem('sec_inventory', JSON.stringify(inventoryList));
        }

        let shoeList = inventoryList.map(item => item.name);

        let orders = JSON.parse(localStorage.getItem('sec_orders')) || [
            { id: '26032301', date: '2026-03-23', staff: '老板', auditor: '老板', client: '张三', brand: '默认厂牌', shoe: '空军一号', color: '纯白', price: 168, cost: 85, tracking: 'SF12345678', remark: '首单内测送袜', status: '待发货' }
        ];
        
        let passwordHash = localStorage.getItem('sec_pwd_hash') || ""; 
        let isUnlocked = (passwordHash === ""); 
        let currentView = 'dashboard';
        let selectedDate = getLocalDateStr(); 
        let editingOrderId = null;

        let githubToken = localStorage.getItem('sec_github_token') || '';
        let gistId = localStorage.getItem('sec_gist_id') || '';
        let isCloudEnabled = (githubToken !== '' && gistId !== '');

        async function init() {
            applyBranding();
            checkCloudUI();

            const observer = new MutationObserver(() => {
                if (!isUnlocked) {
                    const lockNode = document.getElementById('lockScreen');
                    if (!document.body.contains(lockNode) || getComputedStyle(lockNode).display === 'none' || getComputedStyle(lockNode).visibility === 'hidden') {
                        document.body.innerHTML = `<div style="background:#0f172a; color:#ef4444; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;"><h1 style="font-size:2rem; font-weight:900;">非法篡改警告</h1><button onclick="location.reload()" style="margin-top:30px; padding:10px 30px; background:#ef4444; color:white; border-radius:8px;">重新加载</button></div>`;
                    }
                }
            });
            observer.observe(document.body, { childList: true, subtree: true, attributes: true });

            if (!isUnlocked) {
                document.getElementById('lockScreen').classList.remove('hidden');
                document.getElementById('appWrapper').style.display = 'none';
            } else {
                document.getElementById('lockScreen').classList.add('hidden');
                document.getElementById('appWrapper').style.display = 'flex';
                switchView(currentView);
                if(isCloudEnabled) pullFromCloud(false);
            }

            updateClock();
            setInterval(updateClock, 1000);
            
            document.getElementById('pwdInput').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') checkUnlock();
            });
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('currentTimeDisplay').innerText = isMobile ? now.toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'}) : now.toLocaleString('zh-CN');
        }

        function checkCloudUI() {
            const badge = document.getElementById('cloudStatusBadge');
            const syncBtnPc = document.getElementById('btnManualSync');
            const syncBtnMobile = document.getElementById('btnManualSyncMobile');
            if(isCloudEnabled) {
                badge.classList.remove('hidden');
                badge.innerText = '☁️ 极速同步中';
                badge.className = 'text-[9px] bg-emerald-50 text-emerald-500 px-2 py-0.5 rounded-full font-bold ml-2';
                syncBtnPc.classList.remove('hidden');
                syncBtnPc.classList.add('md:flex');
                syncBtnMobile.classList.remove('hidden');
                syncBtnMobile.classList.add('flex');
            } else {
                badge.classList.add('hidden');
                syncBtnPc.classList.add('hidden');
                syncBtnPc.classList.remove('md:flex');
                syncBtnMobile.classList.add('hidden');
                syncBtnMobile.classList.remove('flex');
            }
        }

        async function pullFromCloud(isManual = false) {
            if (!isCloudEnabled) return;
            if(isManual) showToast("☁️ 正在拉取最新同步数据...");
            
            const cleanToken = githubToken.replace(/\s/g, '').trim();
            const cleanGistId = gistId.replace(/\s/g, '').trim();
            
            try {
                const timestamp = new Date().getTime();
                const res = await fetch(`https://api.github.com/gists/${cleanGistId}?t=${timestamp}`, {
                    method: 'GET',
                    headers: { 
                        'Accept': 'application/vnd.github.v3+json',
                        'Authorization': `token ${cleanToken}`
                    }
                });
                
                if (!res.ok) {
                    const errInfo = await res.json().catch(()=>({}));
                    if (isManual) showToast(`⚠️ 拉取失败: [${res.status}] ${errInfo.message || '凭证无效或已被删除'}`);
                    return;
                }
                const data = await res.json();
                if (data.files && data.files["shoe_store_data.json"]) {
                    const content = JSON.parse(data.files["shoe_store_data.json"].content);
                    if (content.orders) orders = content.orders;
                    if (content.staffList) staffList = content.staffList;
                    if (content.brandList) brandList = content.brandList; // 同步品牌
                    if (content.inventoryList) {
                        inventoryList = content.inventoryList;
                        shoeList = inventoryList.map(item => item.name);
                    }
                    if (content.aftersalesList) aftersalesList = content.aftersalesList;
                    if (content.memoList) memoList = content.memoList;
                    
                    localStorage.setItem('sec_orders', JSON.stringify(orders));
                    localStorage.setItem('sec_staff', JSON.stringify(staffList));
                    localStorage.setItem('sec_brands', JSON.stringify(brandList));
                    localStorage.setItem('sec_inventory', JSON.stringify(inventoryList));
                    localStorage.setItem('sec_aftersales', JSON.stringify(aftersalesList));
                    localStorage.setItem('sec_memos', JSON.stringify(memoList));
                    render();
                    if(isManual) showToast("✅ 云端数据同步完成！");
                }
            } catch (e) {
                console.error("GitHub Pull Error:", e);
                if(isManual) showToast(`⚠️ 网络拦截异常: ${e.message}`);
            }
        }

        async function pushToCloud() {
            if (!isCloudEnabled) return;
            
            const cleanToken = githubToken.replace(/\s/g, '').trim();
            const cleanGistId = gistId.replace(/\s/g, '').trim();
            
            try {
                document.getElementById('cloudStatusBadge').innerText = '☁️ 保存至云端...';
                const res = await fetch(`https://api.github.com/gists/${cleanGistId}`, {
                    method: 'PATCH',
                    headers: {
                        'Accept': 'application/vnd.github.v3+json',
                        'Authorization': `token ${cleanToken}`
                    },
                    body: JSON.stringify({
                        files: {
                            "shoe_store_data.json": {
                                content: JSON.stringify({ orders, staffList, brandList, inventoryList, aftersalesList, memoList })
                            }
                        }
                    })
                });
                if (!res.ok) throw new Error("API responded with " + res.status);
                document.getElementById('cloudStatusBadge').innerText = '☁️ 云端已同步';
            } catch (e) {
                console.error("GitHub Push Error:", e);
                showToast("⚠️ 云端请求被拦截，数据已安全保存在本地");
                document.getElementById('cloudStatusBadge').innerText = '⚠️ 云端断开';
            }
        }

        async function checkUnlock() {
            const inputVal = document.getElementById('pwdInput').value;
            const inputHash = await hashPassword(inputVal);
            if (inputHash === passwordHash || passwordHash === "") {
                isUnlocked = true;
                document.getElementById('lockScreen').classList.add('hidden');
                document.getElementById('appWrapper').style.display = 'flex'; 
                document.getElementById('pwdInput').value = "";
                switchView(currentView);
                if(isCloudEnabled) pullFromCloud(false);
            } else {
                showToast("🚫 密码验证失败，请重试！");
            }
        }

        function lockSystem() { 
            if (passwordHash === "") {
                showToast("⚠️ 当前无密码！请在【系统设置】中设置。");
                return;
            }
            isUnlocked = false;
            document.getElementById('appWrapper').style.display = 'none';
            document.getElementById('lockScreen').classList.remove('hidden');
            showToast("🔒 系统已锁定");
        }

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.nav-btn-pc').forEach(b => {
                b.classList.remove('active-nav-pc');
                b.classList.add('text-slate-500', 'hover:bg-white/60');
            });
            const pcBtn = document.getElementById(`pc-btn-${view}`);
            if(pcBtn) {
                pcBtn.classList.add('active-nav-pc');
                pcBtn.classList.remove('text-slate-500', 'hover:bg-white/60');
            }

            document.querySelectorAll('.nav-btn-m').forEach(b => {
                b.classList.remove('active-nav-mobile');
            });
            const mBtn = document.getElementById(`m-btn-${view}`);
            if(mBtn) {
                mBtn.classList.add('active-nav-mobile');
                mBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
            render();
            document.getElementById('mainContent').scrollTop = 0;
        }

        function render() {
            if(!isUnlocked) return; 
            const container = document.getElementById('mainContent');
            if(!container) return; 
            
            container.innerHTML = "";
            if (currentView === 'dashboard') renderDashboard(container);
            else if (currentView === 'orders') renderOrders(container);
            else if (currentView === 'inventory') renderInventory(container); 
            else if (currentView === 'aftersales') renderAftersales(container); 
            else if (currentView === 'records') renderRecords(container);
            else if (currentView === 'memo') renderMemo(container); 
            else if (currentView === 'settings') renderSettings(container);
        }

        function renderDashboard(c) {
            const today = getLocalDateStr();
            const todayOrders = orders.filter(o => o.date === today && o.status !== '已退货');
            const revenue = todayOrders.reduce((s,o) => s + Number(o.price), 0);
            const profit = todayOrders.reduce((s,o) => s + (Number(o.price) - Number(o.cost)), 0);

            // 统计鞋款退货率 (全盘)
            const shoeStats = {};
            orders.forEach(o => {
                if(!shoeStats[o.shoe]) shoeStats[o.shoe] = { total: 0, returned: 0 };
                shoeStats[o.shoe].total++;
                if(o.status === '已退货') shoeStats[o.shoe].returned++;
            });
            const returnRates = Object.entries(shoeStats).map(([shoe, stat]) => ({
                shoe, total: stat.total, 
                rate: stat.total > 0 ? (stat.returned / stat.total * 100).toFixed(1) : 0
            })).sort((a, b) => b.rate - a.rate).slice(0, 4);

            // ✅ 统计【按月度：本月品牌结算台账】
            const todayMonth = today.substring(0, 7); // 取前7位 "YYYY-MM"
            const monthOrders = orders.filter(o => o.date.startsWith(todayMonth) && o.status !== '已退货');
            
            const monthlyBrandStats = {};
            monthOrders.forEach(o => {
                const b = o.brand || '默认厂牌';
                if (!monthlyBrandStats[b]) monthlyBrandStats[b] = { count: 0, cost: 0, revenue: 0 };
                monthlyBrandStats[b].count++;
                monthlyBrandStats[b].cost += Number(o.cost);
                monthlyBrandStats[b].revenue += Number(o.price);
            });

            c.innerHTML = `
                <div class="space-y-6 md:space-y-10 page-enter">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-8">
                        <div class="glass-card p-6 md:p-10 rounded-[2rem] md:rounded-[3rem]">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 md:mb-3">今日有效流水</p>
                            <h3 class="text-3xl md:text-5xl font-black tracking-tighter">¥ ${revenue.toLocaleString()}</h3>
                        </div>
                        <div class="bg-indigo-600 p-6 md:p-10 rounded-[2rem] md:rounded-[3rem] text-white shadow-2xl shadow-indigo-200 relative overflow-hidden">
                            <div class="relative z-10">
                                <p class="text-indigo-100 text-[10px] font-black uppercase tracking-widest mb-2 md:mb-3">今日净利 (除退款)</p>
                                <h3 class="text-3xl md:text-5xl font-black tracking-tighter">¥ ${profit.toLocaleString()}</h3>
                            </div>
                            <div class="absolute top-[-30%] right-[-10%] w-32 h-32 md:w-48 md:h-48 bg-white/10 rounded-full blur-2xl md:blur-3xl"></div>
                        </div>
                        <div class="glass-card p-6 md:p-10 rounded-[2rem] md:rounded-[3rem]">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 md:mb-3">今日成交单数</p>
                            <h3 class="text-3xl md:text-5xl font-black tracking-tighter">${todayOrders.length} <span class="text-base md:text-lg text-slate-400 font-bold ml-1">单</span></h3>
                        </div>
                    </div>

        function processReturn(id) {

                    showToast("⚠️ 必须填写退货原因才能处理售后！");
                    return;
                }
                const index = orders.findIndex(o => o.id === id);

                    orders[index].status = '已退货';
                    
                    const existingAftersale = aftersalesList.find(a => a.orderId === id);

                        const newAftersale = {

                            manufacturer: orders[index].brand || orders[index].shoe,

        // ================= 【品牌与库存系统】 =================
        function addBrand() {
            const name = document.getElementById('set-brand-name').value.trim();
            if (!name) return showToast("⚠️ 品牌名称不能为空！");
            if (brandList.includes(name)) return showToast("⚠️ 该品牌已存在！");
            brandList.push(name);
            localStorage.setItem('sec_brands', JSON.stringify(brandList));
            render();
            pushToCloud();
            showToast("✅ 品牌添加成功");
        }

        function deleteBrand(name) {
            showConfirm("删除品牌", `确定删除品牌 [${escapeHtml(name)}] 吗？\n删除后不影响已有库存和订单。`, () => {
                brandList = brandList.filter(b => b !== name);
                localStorage.setItem('sec_brands', JSON.stringify(brandList));
                render();
                pushToCloud();
                showToast("🗑️ 品牌已删除");
            });
        }

        function addInventoryItem() {
            const brand = document.getElementById('set-shoe-brand').value;
            const name = document.getElementById('set-shoe-name').value.trim();
            const stock = parseInt(document.getElementById('set-shoe-stock').value) || 0;
            const cost = parseFloat(document.getElementById('set-shoe-cost').value) || 0;
            const price = parseFloat(document.getElementById('set-shoe-price').value) || 0;

            if (!name) return showToast("⚠️ 鞋款名称不能为空！");
            if (inventoryList.some(item => item.name === name)) return showToast("⚠️ 该鞋款已存在于库中！");

            const newItem = { id: 'INV' + Date.now(), brand, name, stock, cost, price };
            inventoryList.unshift(newItem);
            shoeList = inventoryList.map(item => item.name);
            localStorage.setItem('sec_inventory', JSON.stringify(inventoryList));
            
            document.getElementById('set-shoe-name').value = "";
            document.getElementById('set-shoe-stock').value = "";
            document.getElementById('set-shoe-cost').value = "";
            document.getElementById('set-shoe-price').value = "";
            
            render();
            pushToCloud();
            showToast("✅ 鞋款已成功入库！");
        }

        function deleteInventoryItem(id) {
            const item = inventoryList.find(i => i.id === id);
            showConfirm("下架鞋款", `确定从库存中彻底移除 [${escapeHtml(item?.name)}] 吗？\n下架后开单将无法选择此鞋款，但不影响历史订单。`, () => {
                inventoryList = inventoryList.filter(i => i.id !== id);
                shoeList = inventoryList.map(item => item.name);
                localStorage.setItem('sec_inventory', JSON.stringify(inventoryList));
                render();
                pushToCloud();
                showToast("🗑️ 鞋款已成功下架");
            });
        }

        function updateInventoryItem(id, field, value) {
            const index = inventoryList.findIndex(i => i.id === id);
            if (index !== -1) {
                if (field === 'name') {
                    if (!value.trim()) {
                        showToast("⚠️ 鞋款名称不能为空");
                        render(); 
                        return;
                    }
                    inventoryList[index][field] = value.trim();
                    shoeList = inventoryList.map(item => item.name);
                } else if (field === 'brand') {
                    inventoryList[index][field] = value;
                } else {
                    inventoryList[index][field] = parseFloat(value) || 0;
                }
                localStorage.setItem('sec_inventory', JSON.stringify(inventoryList));
                
                const totalStock = inventoryList.reduce((sum, item) => sum + (item.stock || 0), 0);
                const stockDisplay = document.getElementById('inv-total-stock');
                if (stockDisplay) stockDisplay.innerText = totalStock;
                
                pushToCloud();
                showToast("💾 修改已自动保存");
            }
        }

        function renderInventory(c) {
            const totalModels = inventoryList.length;
            const totalStock = inventoryList.reduce((sum, item) => sum + (item.stock || 0), 0);
            
            c.innerHTML = `
                <div class="space-y-6 md:space-y-8 page-enter">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-8">

                    aftersalesList[index].finishDate = getLocalDateStr();
                } else {
                    aftersalesList[index].finishDate = '';

                localStorage.setItem('sec_aftersales', JSON.stringify(aftersalesList));

                showToast("🔄 售后进度已更新");
            }

            const orderId = document.getElementById('as-order-id').value.trim();
            const manufacturer = document.getElementById('as-manufacturer').value.trim();

            const remark = document.getElementById('as-remark').value.trim();

                showToast("⚠️ 关联单号、对接厂商和售后类型不能为空！");
                return;

            const newItem = {
                id: 'AS' + Date.now(),
                orderId, manufacturer, type, remark,
                status: '待处理', date: getLocalDateStr(), finishDate: ''
            };
            
            aftersalesList.unshift(newItem);
            localStorage.setItem('sec_aftersales', JSON.stringify(aftersalesList));
            
            render();
            pushToCloud();
            showToast("✅ 售后工单已生成！");

        // ================= 【备忘录】 =================
        function addMemo() {
            const content = document.getElementById('memo-content').value.trim();
            if (!content) return showToast("⚠️ 备忘内容不能为空！");
            
            const newItem = { id: 'MEMO' + Date.now(), content, date: getLocalDateStr(), isDone: false };
            memoList.unshift(newItem);
            localStorage.setItem('sec_memos', JSON.stringify(memoList));
            render();
            pushToCloud();
            showToast("✅ 已添加到备忘录");
        }

        function toggleMemo(id) {
            const index = memoList.findIndex(i => i.id === id);
            if (index !== -1) {
                memoList[index].isDone = !memoList[index].isDone;
                localStorage.setItem('sec_memos', JSON.stringify(memoList));
                render();
                pushToCloud();
            }
        }

        function deleteMemo(id) {
            memoList = memoList.filter(i => i.id !== id);
            localStorage.setItem('sec_memos', JSON.stringify(memoList));
            render();
            pushToCloud();
            showToast("🗑️ 已删除");
        }

            c.innerHTML = `
                <div class="max-w-3xl mx-auto space-y-8 page-enter">

        // ================= 历史记录与归档 =================
        function gotoDate(val) { 
            selectedDate = val; 
            switchView('orders'); 
        }

        function renderRecords(c) {
            const summaryMap = {};
            orders.forEach(o => {
                if(!summaryMap[o.date]) summaryMap[o.date] = { date: o.date, revenue: 0, profit: 0, count: 0, returnCount: 0 };
                if (o.status !== '已退货') {
                    summaryMap[o.date].revenue += Number(o.price);
                    summaryMap[o.date].profit += (o.price - o.cost);
                    summaryMap[o.date].count++;
                } else {
                    summaryMap[o.date].returnCount++;
                }
            });
            const summaries = Object.values(summaryMap).sort((a,b) => b.date.localeCompare(a.date));

            c.innerHTML = `
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 md:gap-8 page-enter">

        function archiveOldOrders() {
            const days = parseInt(document.getElementById('archive-days').value, 10);
            showConfirm("历史数据归档与瘦身", `确定要将 ${days} 天前的所有历史订单导出为 Excel，并从系统中彻底清除吗？\n\n此操作能极大提升系统加载速度！`, () => {
                const cutoffDate = new Date();
                cutoffDate.setDate(cutoffDate.getDate() - days);
                const cutoffStr = getLocalDateStr(cutoffDate);

                const oldOrders = orders.filter(o => o.date < cutoffStr);
                const newHotOrders = orders.filter(o => o.date >= cutoffStr);

                if (oldOrders.length === 0) {
                    showToast(`⚠️ 系统中没有 ${days} 天前的旧订单，无需归档。`);
                    return;
                }

                const exportData = oldOrders.map(o => ({
                    "系统单号": o.id, "订单日期": o.date, "接待员工": o.staff, "对账人员": o.auditor || '-',
                    "品牌": o.brand || '默认厂牌', "鞋款型号": o.shoe, "颜色规格": o.color || '-', "客户信息": o.client || '-',
                    "成交价(元)": o.price, "进货成本(元)": o.cost, "预估毛利(元)": o.price - o.cost,
                    "订单状态": o.status || '正常', "快递单号": o.tracking || '-', "备注说明": o.remark || '-'
                }));

                const ws = XLSX.utils.json_to_sheet(exportData);
                const wscols = [ {wch: 12}, {wch: 12}, {wch: 10}, {wch: 10}, {wch: 15}, {wch: 22}, {wch: 10}, {wch: 15}, {wch: 12}, {wch: 12}, {wch: 12}, {wch: 10}, {wch: 20}, {wch: 25} ];
                ws['!cols'] = wscols;

                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "历史归档订单");
                XLSX.writeFile(wb, `${sysTitle}_${days}天前历史归档_${getLocalDateStr()}.xlsx`);

                orders = newHotOrders;
                localStorage.setItem('sec_orders', JSON.stringify(orders));
                render();
                pushToCloud();

                showToast(`✅ 成功归档并清理了 ${oldOrders.length} 笔历史订单，系统已提速！`);
            });
        }

            if (staffList.includes(name)) { showToast("⚠️ 该员工已存在！"); return; }
            staffList.push(name);
            localStorage.setItem('sec_staff', JSON.stringify(staffList));
            input.value = ""; 
            render();
            pushToCloud();
            showToast("✅ 员工添加成功");

                staffList = staffList.filter(s => s !== name);

        async function saveSettings() {
            githubToken = document.getElementById('set-github-token').value.replace(/\s/g, '').trim();
            gistId = document.getElementById('set-gist-id').value.replace(/\s/g, '').trim();
            
            if (githubToken !== '' && gistId === '') {
                showToast("☁️ 正在通过 GitHub 为您自动创建云端专属数据仓...");
                try {
                    const res = await fetch('https://api.github.com/gists', {
                        method: 'POST',
                        headers: {
                            'Accept': 'application/vnd.github.v3+json',
                            'Authorization': `token ${githubToken}`
                        },
                        body: JSON.stringify({
                            description: "校园鞋店系统云端备份 (请勿删除)",
                            public: false,
                            files: {
                                "shoe_store_data.json": {
                                    content: JSON.stringify({ orders, staffList, brandList, inventoryList, aftersalesList, memoList })
                                }
                            }
                        })
                    });
                    
                    if (!res.ok) {
                        const errData = await res.json().catch(() => ({}));
                        showToast(`⚠️ GitHub 拒绝访问: 请确认 Token 勾选了 gist 权限`);
                        return;
                    }
                    
                    const data = await res.json();
                    if (data.id) {
                        gistId = data.id; 
                        const gistInput = document.getElementById('set-gist-id');
                        if(gistInput) gistInput.value = gistId;
                        showToast("✅ GitHub 云端仓全自动创建成功！请复制ID发给别的设备。");
                    } else {
                        showToast("⚠️ 自动创建失败，返回数据异常");
                        return;
                    }
                } catch (e) {
                    console.error("GitHub API Error:", e);
                    showToast(`⚠️ 网络连接异常: ${e.message}`);
                    return; 
                }
            }

            localStorage.setItem('sec_github_token', githubToken);
            localStorage.setItem('sec_gist_id', gistId);
            
            const wasCloudEnabled = isCloudEnabled;
            isCloudEnabled = (githubToken !== '' && gistId !== '');
            checkCloudUI();

            sysTitle = document.getElementById('set-sys-title').value.trim() || '鞋店系统';
            sysLogo = document.getElementById('set-sys-logo').value.trim() || '👟';
            localStorage.setItem('sec_sys_title', sysTitle);
            localStorage.setItem('sec_sys_logo', sysLogo);
            applyBranding();

            const newPwd = document.getElementById('set-pwd').value;
            if (newPwd !== "") {
                passwordHash = await hashPassword(newPwd);
                localStorage.setItem('sec_pwd_hash', passwordHash);
                showToast("✅ 密码已加密存储！");
                render(); 
            } else if (passwordHash !== "") {
                showConfirm("取消密码", "未输入新密码。确定要取消锁定保护吗？", () => {
                    passwordHash = "";
                    localStorage.setItem('sec_pwd_hash', "");
                    showToast("🔓 密码保护已关闭。");
                    render(); 
                });
            } else {
                showToast("✅ 偏好配置已保存！");
                render();
            }

            if(!wasCloudEnabled && isCloudEnabled) {
                pullFromCloud(true);
            }
        }

        function generateOrderId(dateStr) {
            const parts = dateStr.split('-'); 
            const prefix = parts[0].slice(2) + parts[1] + parts[2]; 
            const todayOrders = orders.filter(o => o.date === dateStr);
            if (todayOrders.length === 0) return prefix + '01'; 
            
            let maxSeq = 0;
            todayOrders.forEach(o => {
                if (o.id && o.id.startsWith(prefix)) {
                    const seqStr = o.id.slice(6); 
                    const seq = parseInt(seqStr, 10);
                    if (!isNaN(seq) && seq > maxSeq) maxSeq = seq;
                }
            });
            return prefix + (maxSeq + 1).toString().padStart(2, '0');
        }

        function saveOrder() {
            const shoe = document.getElementById('f-shoe').value;
            const color = document.getElementById('f-color').value;
            const price = document.getElementById('f-price').value;
            const cost = document.getElementById('f-cost').value;
            
            if(!shoe || price === "" || cost === "") { 
                showToast("⚠️ 请下拉选择鞋款并填写完整的价格信息"); 
                return; 
            }

            const shoeItem = inventoryList.find(i => i.name === shoe);
            const brand = shoeItem ? (shoeItem.brand || '默认厂牌') : '默认厂牌';
            
            if (editingOrderId) {
                const index = orders.findIndex(o => o.id === editingOrderId);
                if (index !== -1) {
                    orders[index].staff = document.getElementById('f-staff').value;
                    orders[index].auditor = document.getElementById('f-auditor').value;
                    orders[index].brand = brand;
                    orders[index].shoe = shoe;
                    orders[index].color = color;
                    orders[index].client = document.getElementById('f-client').value;
                    orders[index].tracking = document.getElementById('f-tracking').value;
                    orders[index].remark = document.getElementById('f-remark').value;
                    orders[index].price = Number(price);
                    orders[index].cost = Number(cost);
                }
            } else {
                const newId = generateOrderId(selectedDate);
                orders.unshift({
                    id: newId, date: selectedDate, 
                    staff: document.getElementById('f-staff').value,
                    auditor: document.getElementById('f-auditor').value,
                    brand: brand,
                    shoe: shoe, color: color, client: document.getElementById('f-client').value, 
                    tracking: document.getElementById('f-tracking').value,
                    remark: document.getElementById('f-remark').value,
                    price: Number(price), cost: Number(cost),
                    status: '待发货'
                });
            }
            
            localStorage.setItem('sec_orders', JSON.stringify(orders));
            closeModal(); 
            render();
            pushToCloud(); 
            showToast(editingOrderId ? "✏️ 订单修改已保存" : "📦 新订单已入库");
        }

        function deleteOrder(id) {
            showConfirm("删除记录", "确定彻底删除这笔订单记录吗？此操作不可恢复。", () => {
                orders = orders.filter(o => o.id !== id);
                
                aftersalesList = aftersalesList.filter(a => a.orderId !== id);
                localStorage.setItem('sec_aftersales', JSON.stringify(aftersalesList));
                
                localStorage.setItem('sec_orders', JSON.stringify(orders));
                render();
                pushToCloud();
                showToast("🗑️ 记录已删除");
            });
        }

        // ================= 系统报表导入导出 =================
        function exportExcel() {
            if (orders.length === 0 && inventoryList.length === 0 && aftersalesList.length === 0) {
                showToast("⚠️ 系统中没有任何数据可供导出");
                return;
            }
            
            showToast("📊 正在生成全局多维数据报表...");
            
            const wb = XLSX.utils.book_new();

            const orderData = orders.map(o => ({
                "系统单号": o.id, "订单日期": o.date, "接待员工": o.staff, "对账人员": o.auditor || '-',
                "厂牌": o.brand || '默认厂牌', "鞋款型号": o.shoe, "颜色规格": o.color || '-', "客户信息": o.client || '-',
                "成交价(元)": o.price, "进货成本(元)": o.cost, "预估毛利(元)": o.price - o.cost,
                "订单状态": o.status || '正常', "快递单号": o.tracking || '-', "备注说明": o.remark || '-'
            }));
            const wsOrders = XLSX.utils.json_to_sheet(orderData.length > 0 ? orderData : [{"提示": "暂无订单数据"}]);
            wsOrders['!cols'] = [ {wch: 12}, {wch: 12}, {wch: 10}, {wch: 10}, {wch: 15}, {wch: 22}, {wch: 10}, {wch: 15}, {wch: 12}, {wch: 12}, {wch: 12}, {wch: 10}, {wch: 20}, {wch: 25} ];
            XLSX.utils.book_append_sheet(wb, wsOrders, "全盘订单明细");

            const invData = inventoryList.map(i => ({
                "所属厂牌": i.brand || '默认厂牌', "鞋款型号": i.name, "当前样鞋库存(双)": i.stock || 0, "默认进价(元)": i.cost || 0, "默认售价(元)": i.price || 0
            }));
            const wsInv = XLSX.utils.json_to_sheet(invData.length > 0 ? invData : [{"提示": "暂无库存数据"}]);
            wsInv['!cols'] = [ {wch: 15}, {wch: 25}, {wch: 18}, {wch: 15}, {wch: 15} ];
            XLSX.utils.book_append_sheet(wb, wsInv, "库存商品台账");

            const asData = aftersalesList.map(a => ({
                "登记日期": a.date, "完结日期": a.finishDate || '-', "关联订单号": a.orderId, "对接厂商": a.manufacturer,
                "售后类型": a.type, "当前状态": a.status, "跟进备注": a.remark || '-'
            }));
            const wsAs = XLSX.utils.json_to_sheet(asData.length > 0 ? asData : [{"提示": "暂无售后数据"}]);
            wsAs['!cols'] = [ {wch: 12}, {wch: 12}, {wch: 15}, {wch: 20}, {wch: 12}, {wch: 12}, {wch: 30} ];
            XLSX.utils.book_append_sheet(wb, wsAs, "售后追踪记录");

            XLSX.writeFile(wb, `${sysTitle}_全局数据报表_${getLocalDateStr()}.xlsx`);
        }

        function doExportBackup() {
            const data = { 
                orders, passwordHash, staffList, brandList, inventoryList, aftersalesList, memoList, 
                sysTitle, sysLogo, exportDate: new Date().toISOString() 
            };
            const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${sysTitle}_离线备份系统包_${getLocalDateStr()}.json`;
            a.click();
            showToast("💾 离线备份导出成功");
        }

        function doImportBackup(input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if(data.orders) {
                        showConfirm("恢复数据", "导入将覆盖所有数据，确定继续吗？", () => {
                            orders = data.orders;
                            passwordHash = data.passwordHash || "";
                            if (data.staffList) staffList = data.staffList;
                            if (data.brandList) brandList = data.brandList; // 导入品牌列表
                            
                            if (data.inventoryList) {
                                inventoryList = data.inventoryList;
                                shoeList = inventoryList.map(item => item.name);
                            } else if (data.shoeList) {
                                shoeList = data.shoeList;
                                inventoryList = shoeList.map((name, index) => ({
                                    id: 'INV' + Date.now() + index, brand: '默认厂牌', name: name, stock: 0, cost: 0, price: 0
                                }));
                            }

                            if (data.aftersalesList) aftersalesList = data.aftersalesList;
                            if (data.memoList) memoList = data.memoList;
                            
                            if (data.sysTitle) sysTitle = data.sysTitle;
                            if (data.sysLogo) sysLogo = data.sysLogo;
                            
                            localStorage.setItem('sec_orders', JSON.stringify(orders));
                            localStorage.setItem('sec_pwd_hash', passwordHash);
                            localStorage.setItem('sec_staff', JSON.stringify(staffList));
                            localStorage.setItem('sec_brands', JSON.stringify(brandList)); // 保存品牌
                            localStorage.setItem('sec_inventory', JSON.stringify(inventoryList));
                            localStorage.setItem('sec_aftersales', JSON.stringify(aftersalesList));
                            localStorage.setItem('sec_memos', JSON.stringify(memoList));
                            localStorage.setItem('sec_sys_title', sysTitle);
                            localStorage.setItem('sec_sys_logo', sysLogo);
                            
                            pushToCloud();
                            showToast("✅ 数据已恢复，重载系统...");
                            setTimeout(() => location.reload(), 1000);
                        });
                    } else { showToast("⚠️ 备份文件格式错误"); }
                } catch(err) { showToast("⚠️ 解析错误"); }
            };
            reader.readAsText(file);
            input.value = "";
        }

        // ================= 终极防报错全局挂载域 =================
        Object.assign(window, {
            updateSelectedDate, exportExcel, showModal, closeModal,
            saveOrder, deleteOrder, editOrder, processReturn, undoReturn,
            gotoDate, addBrand, deleteBrand, addInventoryItem, deleteInventoryItem, updateInventoryItem,
            addAftersale, updateAftersaleStatus, deleteAftersale, addMemo, toggleMemo,
            deleteMemo, archiveOldOrders, doExportBackup, doImportBackup, saveSettings,
            handleShoeSelection, copyGistId, checkUnlock, lockSystem, switchView,
            pullFromCloud, pushToCloud, closeDialog, executeDialogConfirm,
            addStaff, removeStaffByName, markDelivered, undoDelivery
        });

        window.onload = init;
    </script>
</body>
