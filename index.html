<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>校园鞋店管理系统 - HyperOS Security+</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        
        :root { --mi-primary: #4f46e5; --mi-bg: #f2f5f8; }
        body { font-family: 'Inter', sans-serif; background-color: var(--mi-bg); overflow-x: hidden; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        .glass-sidebar { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border-right: 1px solid rgba(255, 255, 255, 0.5); }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.8); box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @media (min-width: 768px) { .glass-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.1); } }
        ::-webkit-scrollbar { width: 0px; height: 0px; background: transparent; }
        
        .page-enter { animation: slideIn 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        @keyframes slideIn { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .active-nav-pc { background: var(--mi-primary) !important; color: white !important; box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3); }
        .active-nav-mobile { color: var(--mi-primary) !important; font-weight: 900; }
        .active-nav-mobile svg { stroke-width: 3; transform: translateY(-2px); transition: all 0.3s; }
        
        input, select { transition: all 0.3s ease; }
        input:focus, select:focus { background: white !important; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15) !important; outline: none; }
        
        .lock-pulse { animation: lockPulse 2.5s infinite ease-in-out; }
        @keyframes lockPulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.85; box-shadow: 0 0 40px rgba(79, 70, 229, 0.4); } 100% { transform: scale(1); opacity: 1; } }
        
        .scale-in-center { animation: scaleInCenter 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        @keyframes scaleInCenter { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        #appWrapper { display: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="min-h-screen text-slate-900">

    <div id="customToast" class="fixed top-12 left-1/2 -translate-x-1/2 z-[10000] bg-slate-800/90 backdrop-blur-md text-white px-6 py-3.5 rounded-full shadow-2xl font-bold text-sm transition-all duration-300 opacity-0 pointer-events-none translate-y-[-20px] whitespace-nowrap">
        提示内容
    </div>

    <div id="customDialog" class="fixed inset-0 z-[10000] bg-slate-900/60 backdrop-blur-sm items-center justify-center p-6 hidden">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl scale-in-center">
            <h3 class="text-xl md:text-2xl font-black mb-3" id="dialogTitle">提示</h3>
            <p class="text-slate-500 text-sm md:text-base font-medium mb-8 leading-relaxed whitespace-pre-line" id="dialogMessage">内容</p>
            <div class="flex space-x-3 md:space-x-4">
                <button onclick="closeDialog()" class="flex-1 py-3.5 md:py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold hover:bg-slate-200 transition-all text-sm md:text-base active:scale-95">取消</button>
                <button onclick="executeDialogConfirm()" class="flex-1 py-3.5 md:py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all text-sm md:text-base active:scale-95">确认</button>
            </div>
        </div>
    </div>
    <div id="lockScreen" class="fixed inset-0 z-[9999] bg-slate-950 flex items-center justify-center overflow-hidden">
        <div class="absolute top-[-10%] left-[-20%] w-[400px] h-[400px] md:w-[600px] md:h-[600px] bg-indigo-600/30 rounded-full blur-[100px] md:blur-[120px]"></div>
        <div class="relative z-10 w-full max-w-md p-8 md:p-12 text-center">
            <div class="w-20 h-20 md:w-24 md:h-24 bg-indigo-600 rounded-[1.5rem] md:rounded-[2rem] flex items-center justify-center text-white mx-auto mb-8 md:mb-10 shadow-2xl lock-pulse text-4xl md:text-5xl dynamic-sys-logo">👟</div>
            <h1 class="text-2xl md:text-3xl font-black text-white mb-2 tracking-tight dynamic-sys-title">鞋店对账系统</h1>
            <p class="text-slate-400 mb-8 md:mb-10 text-xs md:text-sm">请输入管理密码解锁系统</p>
            <input type="password" id="pwdInput" placeholder="••••••" class="w-full bg-slate-900 text-white border border-slate-800 rounded-2xl md:rounded-3xl py-4 md:py-5 text-center text-2xl md:text-3xl tracking-[0.5em] focus:ring-4 focus:ring-indigo-500/30 outline-none mb-6">
            <button onclick="checkUnlock()" class="w-full py-4 md:py-5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl md:rounded-3xl font-black text-base md:text-lg transition-all active:scale-95 shadow-xl shadow-indigo-600/20">解锁进入</button>
        </div>
    </div>

    <div id="appWrapper" class="flex flex-col md:flex-row min-h-screen w-full">
        
        <aside class="hidden md:flex w-72 glass-sidebar flex-col p-8 sticky top-0 h-screen z-40">
            <div class="flex items-center space-x-4 mb-12">
                <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-xl text-2xl dynamic-sys-logo">👟</div>
                <div class="leading-tight">
                    <span class="text-xl font-black tracking-tighter dynamic-sys-title truncate w-40 block">鞋店对账</span>
                    <p class="text-[10px] text-indigo-500 font-black uppercase tracking-widest mt-0.5">Cloud Sync Pro</p>
                </div>
            </div>

            <nav class="flex-1 space-y-3">
                <button onclick="switchView('dashboard')" id="pc-btn-dashboard" class="nav-btn-pc w-full flex items-center space-x-3 px-5 py-4 rounded-2xl transition-all duration-300 active-nav-pc">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
                    <span class="font-bold text-sm tracking-tight">控制面板</span>
                </button>
                <button onclick="switchView('orders')" id="pc-btn-orders" class="nav-btn-pc w-full flex items-center space-x-3 px-5 py-4 rounded-2xl transition-all duration-300 text-slate-500 hover:bg-white/60">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v18"/><path d="M3 12h18"/><rect width="18" height="18" x="3" y="3" rx="2"/></svg>
                    <span class="font-bold text-sm tracking-tight">详细对账</span>
                </button>
                <button onclick="switchView('records')" id="pc-btn-records" class="nav-btn-pc w-full flex items-center space-x-3 px-5 py-4 rounded-2xl transition-all duration-300 text-slate-500 hover:bg-white/60">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
                    <span class="font-bold text-sm tracking-tight">历史汇总</span>
                </button>
                <button onclick="switchView('settings')" id="pc-btn-settings" class="nav-btn-pc w-full flex items-center space-x-3 px-5 py-4 rounded-2xl transition-all duration-300 text-slate-500 hover:bg-white/60">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                    <span class="font-bold text-sm tracking-tight">系统设置</span>
                </button>
            </nav>

            <div class="pt-8 mt-8 border-t border-slate-200/50 space-y-3">
                <button onclick="lockSystem()" class="w-full flex items-center space-x-3 px-5 py-4 rounded-2xl text-rose-500 hover:bg-rose-50 transition-all font-bold text-sm">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V5a5 5 0 0 1 9.9-1"/></svg>
                    <span>锁定系统</span>
                </button>
            </div>
        </aside>

        <nav class="md:hidden fixed bottom-0 left-0 w-full glass-card border-t border-slate-200/50 flex justify-around items-center pt-2 pb-safe z-40 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
            <button onclick="switchView('dashboard')" id="m-btn-dashboard" class="nav-btn-m flex-1 flex flex-col items-center py-2 text-slate-400 active-nav-mobile">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
                <span class="text-[10px] mt-1 font-bold">看板</span>
            </button>
            <button onclick="switchView('orders')" id="m-btn-orders" class="nav-btn-m flex-1 flex flex-col items-center py-2 text-slate-400 transition-all">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v18"/><path d="M3 12h18"/><rect width="18" height="18" x="3" y="3" rx="2"/></svg>
                <span class="text-[10px] mt-1 font-bold">对账</span>
            </button>
            <div class="relative -top-6">
                <button onclick="showModal()" class="w-14 h-14 bg-indigo-600 rounded-full flex items-center justify-center text-white shadow-[0_8px_20px_rgba(79,70,229,0.4)] active:scale-95 transition-transform border-4 border-[#f2f5f8]">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                </button>
            </div>
            <button onclick="switchView('records')" id="m-btn-records" class="nav-btn-m flex-1 flex flex-col items-center py-2 text-slate-400 transition-all">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
                <span class="text-[10px] mt-1 font-bold">历史</span>
            </button>
            <button onclick="switchView('settings')" id="m-btn-settings" class="nav-btn-m flex-1 flex flex-col items-center py-2 text-slate-400 transition-all">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                <span class="text-[10px] mt-1 font-bold">设置</span>
            </button>
        </nav>

        <div class="flex-1 flex flex-col min-w-0 pb-24 md:pb-0">
            <header class="h-16 md:h-24 bg-white/60 backdrop-blur-xl border-b border-slate-200/50 flex items-center justify-between px-4 md:px-10 sticky top-0 z-30">
                <div class="flex items-center space-x-3 md:space-x-8">
                    <div class="md:hidden w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white shadow-md text-sm dynamic-sys-logo">👟</div>
                    <div class="flex flex-col">
                        <span class="hidden md:inline text-xs font-black text-slate-400 uppercase tracking-widest mb-1">当前时间</span>
                        <div class="flex items-center space-x-2">
                            <span id="currentTimeDisplay" class="text-xs md:text-sm font-bold text-slate-700">加载时间中...</span>
                            <span id="cloudStatusBadge" class="hidden text-[9px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full font-bold">☁️ 本地</span>
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center space-x-3 md:space-x-6">
                    <button id="btnManualSync" onclick="pullFromCloud(true)" class="hidden md:flex bg-emerald-50 hover:bg-emerald-100 text-emerald-600 px-4 py-2 rounded-xl font-black text-xs shadow-sm items-center space-x-1 transition-all active:scale-[0.96]">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 2v6h6"/></svg>
                        <span>拉取云端</span>
                    </button>
                    <button id="btnManualSyncMobile" onclick="pullFromCloud(true)" class="md:hidden w-8 h-8 hidden items-center justify-center text-emerald-600 bg-emerald-50 rounded-lg active:scale-90 transition-all">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 2v6h6"/></svg>
                    </button>

                    <button onclick="showModal()" class="hidden md:flex bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3.5 rounded-2xl font-black text-sm shadow-2xl shadow-indigo-100 items-center space-x-3 transition-all active:scale-[0.96]">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                        <span>记一笔</span>
                    </button>
                    <button onclick="lockSystem()" class="md:hidden w-8 h-8 flex items-center justify-center text-rose-500 bg-rose-50 rounded-lg active:scale-90 transition-all">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V5a5 5 0 0 1 9.9-1"/></svg>
                    </button>
                    <div class="hidden md:flex w-12 h-12 rounded-2xl bg-gradient-to-br from-indigo-500 to-blue-600 shadow-xl border-2 border-white items-center justify-center text-white font-black text-2xl dynamic-sys-logo">👟</div>
                </div>
            </header>

            <main id="mainContent" class="p-4 md:p-10 overflow-y-auto overflow-x-hidden flex-1">
                </main>

            <footer class="w-full py-4 md:py-6 mt-auto text-center text-[10px] md:text-xs font-bold text-slate-400 tracking-wider">
                <p>jay for meizhiyuan</p>
                <p class="mt-1 hover:text-indigo-500 transition-colors cursor-pointer">
                    <a href="https://beian.miit.gov.cn/" target="_blank">👮‍备案号 闽ICP备2023017518号</a>
                </p>
            </footer>
        </div>
    </div>

    <div id="addModal" class="fixed inset-0 z-[500] bg-slate-900/60 backdrop-blur-md items-end md:items-center justify-center p-0 md:p-8 hidden">
        <div class="bg-white w-full md:max-w-2xl rounded-t-[2.5rem] md:rounded-[4rem] p-6 md:p-12 shadow-2xl space-y-6 md:space-y-10 border-t md:border border-white max-h-[90vh] overflow-y-auto page-enter pb-safe">
            <div class="flex justify-between items-start sticky top-0 bg-white z-10 pb-2">
                <div>
                    <h3 id="modalTitle" class="text-2xl md:text-4xl font-black tracking-tighter mb-1 md:mb-2">记录销售订单</h3>
                    <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest">Transaction Entry</p>
                </div>
                <button onclick="closeModal()" class="w-10 h-10 md:w-14 md:h-14 bg-slate-100 text-slate-400 rounded-full md:rounded-3xl flex items-center justify-center hover:bg-rose-50 hover:text-rose-500 transition-all active:scale-90">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>
            
            <div class="space-y-5 md:space-y-8">
                <div class="grid grid-cols-2 gap-4 md:gap-8">
                    <div class="space-y-1.5 md:space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">接待</label>
                        <select id="f-staff" class="w-full bg-slate-50 px-4 py-3.5 md:px-8 md:py-5 rounded-2xl md:rounded-3xl border-none outline-none focus:ring-4 focus:ring-indigo-500/10 font-bold text-sm md:text-lg"></select>
                    </div>
                    <div class="space-y-1.5 md:space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">对账</label>
                        <select id="f-auditor" class="w-full bg-slate-50 px-4 py-3.5 md:px-8 md:py-5 rounded-2xl md:rounded-3xl border-none outline-none focus:ring-4 focus:ring-indigo-500/10 font-bold text-sm md:text-lg"></select>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-8">
                    <div class="space-y-1.5 md:space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">鞋款型号</label>
                        <input id="f-shoe" type="text" placeholder="例如：AJ1 High" class="w-full bg-slate-50 px-5 py-4 md:px-8 md:py-5 rounded-2xl md:rounded-3xl border-none focus:ring-4 focus:ring-indigo-500/10 font-bold text-base md:text-lg">
                    </div>
                    <div class="space-y-1.5 md:space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">客户姓名</label>
                        <input id="f-client" type="text" placeholder="例如：张三" class="w-full bg-slate-50 px-5 py-4 md:px-8 md:py-5 rounded-2xl md:rounded-3xl border-none focus:ring-4 focus:ring-indigo-500/10 font-bold text-base md:text-lg">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 md:gap-8">
                    <div class="space-y-1.5 md:space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">成交价 (¥)</label>
                        <input id="f-price" type="number" placeholder="0" class="w-full bg-slate-50 px-4 py-4 md:px-8 md:py-5 rounded-2xl md:rounded-3xl border-none focus:ring-4 focus:ring-indigo-500/10 font-black text-xl md:text-2xl text-indigo-600">
                    </div>
                    <div class="space-y-1.5 md:space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">成本价 (¥)</label>
                        <input id="f-cost" type="number" placeholder="0" class="w-full bg-slate-50 px-4 py-4 md:px-8 md:py-5 rounded-2xl md:rounded-3xl border-none focus:ring-4 focus:ring-indigo-500/10 font-black text-xl md:text-2xl text-slate-400">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-8">
                    <div class="space-y-1.5 md:space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">快递单号</label>
                        <input id="f-tracking" type="text" placeholder="暂无单号" class="w-full bg-slate-50 px-5 py-4 md:px-8 md:py-5 rounded-2xl md:rounded-3xl border-none focus:ring-4 focus:ring-indigo-500/10 font-bold text-sm md:text-lg text-indigo-600 font-mono">
                    </div>
                    <div class="space-y-1.5 md:space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">备注信息</label>
                        <input id="f-remark" type="text" placeholder="例如：加急、送袜..." class="w-full bg-slate-50 px-5 py-4 md:px-8 md:py-5 rounded-2xl md:rounded-3xl border-none focus:ring-4 focus:ring-indigo-500/10 font-bold text-sm md:text-lg">
                    </div>
                </div>
                <button onclick="saveOrder()" class="w-full bg-indigo-600 py-4 md:py-6 mt-4 text-white font-black text-lg md:text-xl rounded-2xl md:rounded-[2rem] shadow-xl shadow-indigo-100 flex items-center justify-center space-x-2 md:space-x-4 active:scale-95 transition-all">
                    <span>确认保存并入库</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        let activeConfirmCallback = null;

        function showToast(msg) {
            const toast = document.getElementById('customToast');
            toast.innerText = msg;
            toast.style.opacity = '1';
            toast.style.transform = isMobile ? 'translate(-50%, 20px)' : 'translate(-50%, 0)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, -20px)';
            }, 3000);
        }

        function showConfirm(title, msg, callback) {
            document.getElementById('dialogTitle').innerText = title;
            document.getElementById('dialogMessage').innerText = msg;
            activeConfirmCallback = callback; 
            const dialog = document.getElementById('customDialog');
            dialog.classList.remove('hidden');
            dialog.classList.add('flex');
        }

        function closeDialog() {
            const dialog = document.getElementById('customDialog');
            dialog.classList.add('hidden');
            dialog.classList.remove('flex');
            activeConfirmCallback = null;
        }

        function executeDialogConfirm() {
            if (activeConfirmCallback) activeConfirmCallback();
            closeDialog();
        }

        function applyBranding() {
            const titleEls = document.querySelectorAll('.dynamic-sys-title');
            titleEls.forEach(el => el.innerText = sysTitle);
            const logoEls = document.querySelectorAll('.dynamic-sys-logo');
            logoEls.forEach(el => el.innerText = sysLogo);
            document.title = `${sysTitle} - HyperOS Security+`;
        }

        async function hashPassword(pwd) {
            if (!pwd) return "";
            let hash = 0;
            for (let i = 0; i < pwd.length; i++) {
                const char = pwd.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash; 
            }
            return "hyper_sec_" + Math.abs(hash).toString(36);
        }

        // --- 数据与云端状态管理 ---
        let sysTitle = localStorage.getItem('sec_sys_title') || '校园鞋店系统';
        let sysLogo = localStorage.getItem('sec_sys_logo') || '👟';
        let savedStaff = JSON.parse(localStorage.getItem('sec_staff'));
        let staffList = (savedStaff && savedStaff.length > 0) ? savedStaff : ['老板'];
        let orders = JSON.parse(localStorage.getItem('sec_orders')) || [];
        
        let passwordHash = localStorage.getItem('sec_pwd_hash') || ""; 
        let isUnlocked = (passwordHash === ""); 
        let currentView = 'dashboard';
        let selectedDate = new Date().toISOString().split('T')[0];
        let editingOrderId = null;

        // 【新增】云端同步配置
        let cloudApiKey = localStorage.getItem('sec_cloud_api') || '';
        let cloudBinId = localStorage.getItem('sec_cloud_bin') || '';
        let isCloudEnabled = (cloudApiKey !== '' && cloudBinId !== '');

        // --- 系统初始化 ---
        async function init() {
            applyBranding();
            checkCloudUI();

            const observer = new MutationObserver(() => {
                if (!isUnlocked) {
                    const lockNode = document.getElementById('lockScreen');
                    if (!document.body.contains(lockNode) || getComputedStyle(lockNode).display === 'none' || getComputedStyle(lockNode).visibility === 'hidden') {
                        document.body.innerHTML = `<div style="background:#0f172a; color:#ef4444; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;"><h1 style="font-size:2rem; font-weight:900;">非法篡改警告</h1><button onclick="location.reload()" style="margin-top:30px; padding:10px 30px; background:#ef4444; color:white; border-radius:8px;">重新加载</button></div>`;
                    }
                }
            });
            observer.observe(document.body, { childList: true, subtree: true, attributes: true });

            if (!isUnlocked) {
                document.getElementById('lockScreen').classList.remove('hidden');
                document.getElementById('appWrapper').style.display = 'none';
            } else {
                document.getElementById('lockScreen').classList.add('hidden');
                document.getElementById('appWrapper').style.display = 'flex';
                switchView(currentView);
                // 解锁成功后，如果有云端配置，自动拉取最新数据
                if(isCloudEnabled) pullFromCloud(false);
            }

            updateClock();
            setInterval(updateClock, 1000);
            
            document.getElementById('pwdInput').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') checkUnlock();
            });
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('currentTimeDisplay').innerText = isMobile ? now.toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'}) : now.toLocaleString('zh-CN');
        }

        function checkCloudUI() {
            const badge = document.getElementById('cloudStatusBadge');
            const syncBtnPc = document.getElementById('btnManualSync');
            const syncBtnMobile = document.getElementById('btnManualSyncMobile');
            if(isCloudEnabled) {
                badge.classList.remove('hidden');
                badge.innerText = '☁️ 云端同步中';
                badge.className = 'text-[9px] bg-emerald-50 text-emerald-500 px-2 py-0.5 rounded-full font-bold ml-2';
                syncBtnPc.classList.remove('hidden');
                syncBtnPc.classList.add('md:flex');
                syncBtnMobile.classList.remove('hidden');
                syncBtnMobile.classList.add('flex');
            } else {
                badge.classList.add('hidden');
                syncBtnPc.classList.add('hidden');
                syncBtnPc.classList.remove('md:flex');
                syncBtnMobile.classList.add('hidden');
                syncBtnMobile.classList.remove('flex');
            }
        }

        // ================= 云端核心逻辑 (基于 JSONBin) =================
        async function pullFromCloud(isManual = false) {
            if (!isCloudEnabled) return;
            if(isManual) showToast("☁️ 正在从云端拉取最新数据...");
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${cloudBinId}`, {
                    method: 'GET',
                    headers: { 'X-Master-Key': cloudApiKey }
                });
                const data = await res.json();
                if (data.record) {
                    if (data.record.orders) orders = data.record.orders;
                    if (data.record.staffList) staffList = data.record.staffList;
                    localStorage.setItem('sec_orders', JSON.stringify(orders));
                    localStorage.setItem('sec_staff', JSON.stringify(staffList));
                    render();
                    if(isManual) showToast("✅ 云端数据同步完成！");
                }
            } catch (e) {
                if(isManual) showToast("⚠️ 云端拉取失败，请检查网络或云端密钥");
            }
        }

        async function pushToCloud() {
            if (!isCloudEnabled) return;
            try {
                document.getElementById('cloudStatusBadge').innerText = '☁️ 保存至云端...';
                await fetch(`https://api.jsonbin.io/v3/b/${cloudBinId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': cloudApiKey
                    },
                    body: JSON.stringify({ orders, staffList })
                });
                document.getElementById('cloudStatusBadge').innerText = '☁️ 云端已同步';
            } catch (e) {
                showToast("⚠️ 云端保存失败，数据已暂存本地");
                document.getElementById('cloudStatusBadge').innerText = '⚠️ 云端断开';
            }
        }
        // ==============================================================

        async function checkUnlock() {
            const inputVal = document.getElementById('pwdInput').value;
            const inputHash = await hashPassword(inputVal);
            if (inputHash === passwordHash || passwordHash === "") {
                isUnlocked = true;
                document.getElementById('lockScreen').classList.add('hidden');
                document.getElementById('appWrapper').style.display = 'flex'; 
                document.getElementById('pwdInput').value = "";
                switchView(currentView);
                if(isCloudEnabled) pullFromCloud(false);
            } else {
                showToast("🚫 密码验证失败，请重试！");
            }
        }

        function lockSystem() { 
            if (passwordHash === "") {
                showToast("⚠️ 当前无密码！请在【系统设置】中设置。");
                return;
            }
            isUnlocked = false;
            document.getElementById('appWrapper').style.display = 'none';
            document.getElementById('lockScreen').classList.remove('hidden');
            showToast("🔒 系统已锁定");
        }

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.nav-btn-pc').forEach(b => {
                b.classList.remove('active-nav-pc');
                b.classList.add('text-slate-500', 'hover:bg-white/60');
            });
            const pcBtn = document.getElementById(`pc-btn-${view}`);
            if(pcBtn) {
                pcBtn.classList.add('active-nav-pc');
                pcBtn.classList.remove('text-slate-500', 'hover:bg-white/60');
            }

            document.querySelectorAll('.nav-btn-m').forEach(b => {
                b.classList.remove('active-nav-mobile');
            });
            const mBtn = document.getElementById(`m-btn-${view}`);
            if(mBtn) {
                mBtn.classList.add('active-nav-mobile');
            }
            render();
            document.getElementById('mainContent').scrollTop = 0;
        }

        function render() {
            if(!isUnlocked) return; 
            const container = document.getElementById('mainContent');
            if(!container) return; 
            
            container.innerHTML = "";
            if (currentView === 'dashboard') renderDashboard(container);
            else if (currentView === 'orders') renderOrders(container);
            else if (currentView === 'records') renderRecords(container);
            else if (currentView === 'settings') renderSettings(container);
        }

        function renderDashboard(c) {
            const today = new Date().toISOString().split('T')[0];
            const tOrders = orders.filter(o => o.date === today);
            const revenue = tOrders.reduce((s,o) => s + Number(o.price), 0);
            const profit = tOrders.reduce((s,o) => s + (Number(o.price) - Number(o.cost)), 0);

            c.innerHTML = `
                <div class="space-y-6 md:space-y-10 page-enter">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-8">
                        <div class="glass-card p-6 md:p-10 rounded-[2rem] md:rounded-[3rem]">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 md:mb-3">今日流水</p>
                            <h3 class="text-3xl md:text-5xl font-black tracking-tighter">¥ ${revenue.toLocaleString()}</h3>
                        </div>
                        <div class="bg-indigo-600 p-6 md:p-10 rounded-[2rem] md:rounded-[3rem] text-white shadow-2xl shadow-indigo-200 relative overflow-hidden">
                            <div class="relative z-10">
                                <p class="text-indigo-100 text-[10px] font-black uppercase tracking-widest mb-2 md:mb-3">今日净利</p>
                                <h3 class="text-3xl md:text-5xl font-black tracking-tighter">¥ ${profit.toLocaleString()}</h3>
                            </div>
                            <div class="absolute top-[-30%] right-[-10%] w-32 h-32 md:w-48 md:h-48 bg-white/10 rounded-full blur-2xl md:blur-3xl"></div>
                        </div>
                        <div class="glass-card p-6 md:p-10 rounded-[2rem] md:rounded-[3rem]">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 md:mb-3">成交单数</p>
                            <h3 class="text-3xl md:text-5xl font-black tracking-tighter">${tOrders.length} <span class="text-base md:text-lg text-slate-400 font-bold ml-1">单</span></h3>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderOrders(c) {
            const filtered = orders.filter(o => o.date === selectedDate);
            const swipeHint = isMobile ? `<div class="text-center text-[10px] text-indigo-400 font-bold mb-3 animate-pulse">👉 左右滑动表格查看完整对账信息</div>` : '';

            c.innerHTML = `
                <div class="space-y-5 md:space-y-8 page-enter">
                    <div class="flex justify-between items-center bg-white/60 p-2 md:p-0 rounded-3xl md:bg-transparent">
                        <input type="date" value="${selectedDate}" onchange="updateSelectedDate(this.value)" class="px-4 py-3 md:px-6 md:py-4 bg-white/80 border-none md:border border-white rounded-2xl md:rounded-3xl font-black text-xs md:text-sm outline-none focus:ring-4 focus:ring-indigo-500/10 shadow-sm flex-1 md:flex-none">
                        <div class="flex space-x-2 md:space-x-4 ml-3 md:ml-0">
                            <button onclick="exportExcel()" class="flex items-center justify-center bg-indigo-50 md:bg-white px-4 py-3 md:px-6 md:py-4 rounded-2xl md:rounded-3xl text-xs font-black text-indigo-600 md:text-slate-600 shadow-sm active:scale-95">
                                <svg class="md:hidden mr-1" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                                <span>导出<span class="hidden md:inline"> EXCEL</span></span>
                            </button>
                        </div>
                    </div>
                    ${swipeHint}
                    <div class="glass-card rounded-[2rem] md:rounded-[3.5rem] overflow-hidden border border-white/50 shadow-sm">
                        <div class="overflow-x-auto" style="-webkit-overflow-scrolling: touch;">
                            <table class="w-full text-left text-sm min-w-[1000px] md:min-w-[1200px]">
                                <thead class="bg-slate-50/80 text-slate-400 font-black uppercase tracking-widest text-[10px] border-b border-slate-100">
                                    <tr>
                                        <th class="px-5 py-4 md:px-8 md:py-7 whitespace-nowrap">单号</th>
                                        <th class="px-5 py-4 md:px-8 md:py-7 whitespace-nowrap">接待/对账</th>
                                        <th class="px-5 py-4 md:px-8 md:py-7 whitespace-nowrap">鞋款</th>
                                        <th class="px-5 py-4 md:px-8 md:py-7 whitespace-nowrap">客户</th>
                                        <th class="px-5 py-4 md:px-8 md:py-7 text-right whitespace-nowrap">成交价</th>
                                        <th class="px-5 py-4 md:px-8 md:py-7 text-right whitespace-nowrap">成本</th>
                                        <th class="px-5 py-4 md:px-8 md:py-7 text-right text-emerald-500 whitespace-nowrap">利润</th>
                                        <th class="px-5 py-4 md:px-8 md:py-7 whitespace-nowrap">单号/备注</th>
                                        <th class="px-5 py-4 md:px-8 md:py-7 text-center whitespace-nowrap sticky right-0 bg-slate-50/90 backdrop-blur">操作</th>
                                    </tr>
                                </thead>
                                <tbody class="font-bold divide-y divide-slate-50">
                                    ${filtered.map(o => `
                                        <tr class="hover:bg-slate-50/50 transition-colors group">
                                            <td class="px-5 py-4 md:px-8 md:py-6 text-slate-400 font-mono text-[10px]">#${o.id}</td>
                                            <td class="px-5 py-4 md:px-8 md:py-6">
                                                <div class="flex flex-col space-y-1">
                                                    <span class="bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-lg text-[9px] font-black w-max">接: ${o.staff || '-'}</span>
                                                    <span class="bg-amber-50 text-amber-600 px-2 py-0.5 rounded-lg text-[9px] font-black w-max">账: ${o.auditor || '-'}</span>
                                                </div>
                                            </td>
                                            <td class="px-5 py-4 md:px-8 md:py-6 tracking-tight text-sm">${o.shoe}</td>
                                            <td class="px-5 py-4 md:px-8 md:py-6 text-slate-500 text-xs">${o.client || '-'}</td>
                                            <td class="px-5 py-4 md:px-8 md:py-6 text-right text-indigo-600 text-base">¥ ${o.price}</td>
                                            <td class="px-5 py-4 md:px-8 md:py-6 text-right text-slate-300 text-sm">¥ ${o.cost}</td>
                                            <td class="px-5 py-4 md:px-8 md:py-6 text-right text-emerald-600 text-base">¥ ${o.price - o.cost}</td>
                                            <td class="px-5 py-4 md:px-8 md:py-6">
                                                <div class="text-indigo-400 text-[10px] font-mono mb-1">${o.tracking || '-'}</div>
                                                <div class="text-slate-400 text-[10px] max-w-[120px] truncate" title="${o.remark || ''}">${o.remark || '-'}</div>
                                            </td>
                                            <td class="px-5 py-4 md:px-8 md:py-6 text-center sticky right-0 bg-white/90 backdrop-blur border-l border-slate-50">
                                                <div class="flex items-center justify-center space-x-1 md:space-x-2 md:opacity-0 group-hover:opacity-100 transition-all">
                                                    <button onclick="editOrder('${o.id}')" class="text-indigo-500 bg-indigo-50 md:bg-transparent p-2 rounded-xl text-xs md:text-sm active:scale-90 transition-all">修改</button>
                                                    <button onclick="deleteOrder('${o.id}')" class="text-rose-500 bg-rose-50 md:bg-transparent p-2 rounded-xl text-xs md:text-sm active:scale-90 transition-all">删除</button>
                                                </div>
                                            </td>
                                        </tr>
                                    `).join('')}
                                    ${filtered.length === 0 ? '<tr><td colspan="9" class="py-20 md:py-24 text-center text-slate-300 font-black tracking-widest uppercase text-xs md:text-sm">暂无订单记录</td></tr>' : ''}
                                </tbody>
                                ${filtered.length > 0 ? `
                                <tfoot class="bg-slate-50/80 font-black text-slate-900 border-t border-slate-100">
                                    <tr>
                                        <td colspan="4" class="px-5 py-5 md:px-8 md:py-6 text-right uppercase tracking-[0.3em] text-[10px] text-slate-400">当日小计</td>
                                        <td class="px-5 py-5 md:px-8 md:py-6 text-right text-lg md:text-xl tracking-tighter">¥ ${filtered.reduce((s,o) => s + Number(o.price), 0).toLocaleString()}</td>
                                        <td class="px-5 py-5 md:px-8 md:py-6 text-right text-xs md:text-sm text-slate-400">¥ ${filtered.reduce((s,o) => s + Number(o.cost), 0).toLocaleString()}</td>
                                        <td class="px-5 py-5 md:px-8 md:py-6 text-right text-lg md:text-xl tracking-tighter text-emerald-600">¥ ${filtered.reduce((s,o) => s + (Number(o.price) - Number(o.cost)), 0).toLocaleString()}</td>
                                        <td colspan="2" class="sticky right-0 bg-slate-50/90 backdrop-blur"></td>
                                    </tr>
                                </tfoot>
                                ` : ''}
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderRecords(c) {
            const summaryMap = {};
            orders.forEach(o => {
                if(!summaryMap[o.date]) summaryMap[o.date] = { date: o.date, revenue: 0, profit: 0, count: 0 };
                summaryMap[o.date].revenue += Number(o.price);
                summaryMap[o.date].profit += (o.price - o.cost);
                summaryMap[o.date].count++;
            });
            const summaries = Object.values(summaryMap).sort((a,b) => b.date.localeCompare(a.date));

            c.innerHTML = `
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 md:gap-8 page-enter">
                    ${summaries.map(s => `
                        <div onclick="gotoDate('${s.date}')" class="glass-card p-6 md:p-10 rounded-[2rem] md:rounded-[3.5rem] cursor-pointer active:scale-[0.98] transition-transform">
                            <div class="bg-slate-100 px-3 py-1.5 md:px-4 md:py-2 rounded-xl md:rounded-2xl text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4 md:mb-6 w-max">${s.date}</div>
                            <p class="text-3xl md:text-4xl font-black text-slate-800 tracking-tighter mb-2">¥ ${s.revenue.toLocaleString()}</p>
                            <p class="text-xs md:text-sm font-black text-emerald-500 bg-emerald-50 px-3 py-1 rounded-lg md:rounded-xl w-max">净利 ¥ ${s.profit.toLocaleString()}</p>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderSettings(c) {
            c.innerHTML = `
                <div class="max-w-2xl mx-auto space-y-8 md:space-y-10 page-enter">
                    <div class="glass-card p-6 md:p-12 rounded-[2rem] md:rounded-[4rem] space-y-8 md:space-y-10">
                        <h3 class="text-2xl md:text-3xl font-black tracking-tighter">系统偏好设置</h3>
                        
                        <section class="space-y-4 md:space-y-6">
                            <div class="flex items-center space-x-3 md:space-x-4 text-slate-900">
                                <span class="text-indigo-600 font-black text-xl">☁️</span>
                                <span class="font-black text-lg md:text-xl tracking-tight">云端同步数据库</span>
                            </div>
                            <div class="bg-indigo-50/50 md:bg-indigo-50 p-5 md:p-8 rounded-[1.5rem] md:rounded-[2.5rem] space-y-4 md:space-y-6 border border-indigo-100">
                                <div class="space-y-2">
                                    <label class="text-[10px] font-black text-indigo-400 uppercase tracking-widest ml-1">云端状态: ${isCloudEnabled ? '<span class="text-emerald-500">已连接 (自动同步开)</span>' : '<span class="text-slate-400">未连接 (仅存本地)</span>'}</label>
                                    <input id="set-cloud-api" type="text" value="${cloudApiKey}" placeholder="输入 JSONBin 的 API 密钥 (必填)" class="w-full bg-white px-5 py-4 md:px-8 md:py-5 rounded-2xl md:rounded-3xl border border-indigo-100 outline-none focus:ring-2 focus:ring-indigo-500/20 font-bold text-sm md:text-base text-indigo-700">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-[10px] font-black text-indigo-400 uppercase tracking-widest ml-1">数据仓库 (Bin ID)</label>
                                    <input id="set-cloud-bin" type="text" value="${cloudBinId}" placeholder="留空则系统将为您全自动建仓！" class="w-full bg-white px-5 py-4 md:px-8 md:py-5 rounded-2xl md:rounded-3xl border border-indigo-100 outline-none focus:ring-2 focus:ring-indigo-500/20 font-bold text-sm md:text-base text-indigo-700 font-mono">
                                </div>
                                <p class="text-[10px] text-indigo-400 leading-relaxed font-bold">💡 绝赞升级：只需在 JSONBin 获取并填入 API 密钥，Bin ID 完全留空并点击底部保存，系统将为您全自动创建专属数据仓！告别手动配置的繁琐。</p>
                            </div>
                        </section>

                        <section class="space-y-4 md:space-y-6">
                            <div class="flex items-center space-x-3 md:space-x-4 text-slate-900">
                                <span class="text-indigo-600 font-black text-xl">💡</span>
                                <span class="font-black text-lg md:text-xl tracking-tight">品牌个性化</span>
                            </div>
                            <div class="bg-slate-50/50 md:bg-slate-50 p-5 md:p-8 rounded-[1.5rem] md:rounded-[2.5rem] space-y-4 md:space-y-6">
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                                    <div class="space-y-2">
                                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">系统名称</label>
                                        <input id="set-sys-title" type="text" value="${sysTitle}" placeholder="如：我的鞋店系统" class="w-full bg-white px-5 py-4 md:px-8 md:py-5 rounded-2xl md:rounded-3xl border border-slate-100 outline-none focus:ring-2 focus:ring-indigo-500/20 font-bold text-sm md:text-base">
                                    </div>
                                    <div class="space-y-2">
                                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Logo (单字/Emoji)</label>
                                        <input id="set-sys-logo" type="text" maxlength="2" value="${sysLogo}" placeholder="👟" class="w-full bg-white px-5 py-4 md:px-8 md:py-5 rounded-2xl md:rounded-3xl border border-slate-100 outline-none focus:ring-2 focus:ring-indigo-500/20 font-bold text-center text-xl md:text-2xl">
                                    </div>
                                </div>
                            </div>
                        </section>

                        <section class="space-y-4 md:space-y-6">
                            <div class="flex items-center space-x-3 md:space-x-4 text-slate-900">
                                <span class="text-indigo-600 font-black text-xl">👥</span>
                                <span class="font-black text-lg md:text-xl tracking-tight">员工管理</span>
                            </div>
                            <div class="bg-slate-50/50 md:bg-slate-50 p-5 md:p-8 rounded-[1.5rem] md:rounded-[2.5rem] space-y-4 md:space-y-6">
                                <div class="flex flex-col md:flex-row space-y-3 md:space-y-0 md:space-x-4">
                                    <input id="set-staff-name" type="text" placeholder="输入新员工姓名" class="flex-1 bg-white px-5 py-4 md:px-8 md:py-4 rounded-2xl md:rounded-3xl border border-slate-100 outline-none focus:ring-2 focus:ring-indigo-500/20 font-bold text-sm md:text-base">
                                    <button type="button" onclick="addStaff()" class="w-full md:w-auto px-6 py-4 bg-indigo-600 text-white rounded-2xl md:rounded-3xl font-black shadow-lg md:shadow-xl active:scale-95 transition-all text-sm md:text-base">添加</button>
                                </div>
                                <div class="flex flex-wrap gap-2 md:gap-4 pt-4 md:pt-6 border-t border-slate-200/60">
                                    ${staffList.map(s => `
                                        <div class="flex items-center bg-white border border-slate-200 px-3 py-1.5 md:px-4 md:py-2 rounded-xl md:rounded-2xl shadow-sm">
                                            <span class="font-bold text-xs md:text-sm text-slate-700 mr-2 md:mr-3">${s}</span>
                                            <button type="button" onclick="removeStaffByName('${s}')" class="p-1 text-slate-300 hover:text-rose-500 bg-slate-50 hover:bg-rose-50 rounded-md transition-colors active:scale-90">
                                                <svg class="pointer-events-none" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                                            </button>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </section>

                        <section class="space-y-4 md:space-y-6">
                            <div class="flex items-center space-x-3 md:space-x-4 text-slate-900">
                                <span class="text-indigo-600 font-black text-xl">🛡️</span>
                                <span class="font-black text-lg md:text-xl tracking-tight">安全防护</span>
                            </div>
                            <div class="bg-slate-50/50 md:bg-slate-50 p-5 md:p-8 rounded-[1.5rem] md:rounded-[2.5rem]">
                                <div class="space-y-2 md:space-y-3">
                                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">锁屏状态: ${passwordHash === "" ? '<span class="text-rose-500">无密码</span>' : '<span class="text-emerald-500">已加密</span>'}</label>
                                    <input id="set-pwd" type="text" placeholder="留空取消密码，填入新密码覆盖" class="w-full bg-white px-5 py-4 md:px-8 md:py-5 rounded-2xl md:rounded-3xl border border-slate-100 outline-none focus:ring-2 focus:ring-indigo-500/20 font-bold text-sm md:text-base">
                                </div>
                            </div>
                        </section>

                        <section class="space-y-4 md:space-y-6">
                            <div class="flex items-center space-x-3 md:space-x-4 text-slate-900">
                                <span class="text-indigo-600 font-black text-xl">💾</span>
                                <span class="font-black text-lg md:text-xl tracking-tight">本地备份恢复</span>
                            </div>
                            <div class="grid grid-cols-2 gap-3 md:gap-6">
                                <button onclick="doExportBackup()" class="flex flex-col items-center justify-center p-5 md:p-10 bg-indigo-50 border border-indigo-100 rounded-[1.5rem] md:rounded-[3rem] text-indigo-600 active:bg-indigo-600 active:text-white transition-colors">
                                    <span class="font-black text-sm md:text-base">导出离线数据</span>
                                </button>
                                <label class="flex flex-col items-center justify-center p-5 md:p-10 bg-slate-50 border border-slate-100 rounded-[1.5rem] md:rounded-[3rem] text-slate-600 active:bg-slate-100 cursor-pointer transition-colors">
                                    <span class="font-black text-sm md:text-base">恢复离线数据</span>
                                    <input type="file" onchange="doImportBackup(this)" class="hidden">
                                </label>
                            </div>
                        </section>
                        
                        <div class="pt-6 md:pt-8 border-t border-slate-100">
                            <button onclick="saveSettings()" class="w-full py-4 md:py-5 bg-indigo-600 text-white rounded-2xl md:rounded-3xl font-black text-base md:text-lg shadow-lg active:scale-95 transition-transform">安全保存所有配置</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function showModal(orderId = null) { 
            const staffOptions = staffList.map(s => `<option value="${s}">${s}</option>`).join('');
            document.getElementById('f-staff').innerHTML = staffOptions;
            document.getElementById('f-auditor').innerHTML = `<option value="">无需对账员</option>` + staffOptions;
            
            editingOrderId = orderId; 
            const titleEl = document.getElementById('modalTitle');

            if (orderId) {
                titleEl.innerText = "修改销售订单";
                const order = orders.find(o => o.id === orderId);
                if (order) {
                    document.getElementById('f-staff').value = order.staff || staffList[0];
                    document.getElementById('f-auditor').value = order.auditor || "";
                    document.getElementById('f-shoe').value = order.shoe || "";
                    document.getElementById('f-client').value = order.client || "";
                    document.getElementById('f-price').value = order.price || "";
                    document.getElementById('f-cost').value = order.cost || "";
                    document.getElementById('f-tracking').value = order.tracking || "";
                    document.getElementById('f-remark').value = order.remark || "";
                }
            } else {
                titleEl.innerText = "记录销售订单";
                document.getElementById('f-staff').value = staffList[0] || "";
                document.getElementById('f-auditor').value = "";
                document.getElementById('f-shoe').value = "";
                document.getElementById('f-client').value = "";
                document.getElementById('f-price').value = "";
                document.getElementById('f-cost').value = "";
                document.getElementById('f-tracking').value = "";
                document.getElementById('f-remark').value = "";
            }

            document.getElementById('addModal').classList.remove('hidden'); 
            document.getElementById('addModal').classList.add('flex'); 
        }
        
        function closeModal() { 
            document.getElementById('addModal').classList.add('hidden'); 
            document.getElementById('addModal').classList.remove('flex'); 
            editingOrderId = null; 
        }

        function editOrder(id) { showModal(id); }

        function addStaff() {
            const input = document.getElementById('set-staff-name');
            const name = input.value.trim();
            if (!name) return;
            if (staffList.includes(name)) { showToast("⚠️ 该员工已存在！"); return; }
            staffList.push(name);
            localStorage.setItem('sec_staff', JSON.stringify(staffList));
            input.value = ""; 
            render();
            pushToCloud(); // 触发云同步
            showToast("✅ 员工添加成功");
        }

        function removeStaffByName(name) {
            showConfirm("删除员工", `确定删除员工 [${name}] 吗？\n历史订单中的记录不受影响。`, () => {
                staffList = staffList.filter(s => s !== name);
                localStorage.setItem('sec_staff', JSON.stringify(staffList));
                render();
                pushToCloud(); // 触发云同步
                showToast("🗑️ 员工已删除");
            });
        }

        async function saveSettings() {
            // 获取云端配置输入
            cloudApiKey = document.getElementById('set-cloud-api').value.trim();
            cloudBinId = document.getElementById('set-cloud-bin').value.trim();
            
            // 【新增】绝赞的自动化建仓功能！
            if (cloudApiKey !== '' && cloudBinId === '') {
                showToast("☁️ 正在为您自动创建云端专属数据仓...");
                try {
                    const res = await fetch('https://api.jsonbin.io/v3/b', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Master-Key': cloudApiKey,
                            'X-Bin-Name': '校园鞋店系统备份' // 给新建的 Bin 命个名
                        },
                        body: JSON.stringify({ orders, staffList })
                    });
                    const data = await res.json();
                    if (data.metadata && data.metadata.id) {
                        cloudBinId = data.metadata.id; // 自动获得生成的 Bin ID
                        // 把它填回到界面的输入框里
                        const binInput = document.getElementById('set-cloud-bin');
                        if(binInput) binInput.value = cloudBinId;
                        showToast("✅ 云端仓全自动创建成功！");
                    } else {
                        showToast("⚠️ 自动创建失败，请确保您输入的 API 密钥正确");
                        return; // 终止后续的保存
                    }
                } catch (e) {
                    showToast("⚠️ 网络连接错误，无法连接到云端服务器");
                    return; 
                }
            }

            // 无论如何，将最终的配置保存到本地
            localStorage.setItem('sec_cloud_api', cloudApiKey);
            localStorage.setItem('sec_cloud_bin', cloudBinId);
            
            const wasCloudEnabled = isCloudEnabled;
            isCloudEnabled = (cloudApiKey !== '' && cloudBinId !== '');
            checkCloudUI();

            sysTitle = document.getElementById('set-sys-title').value.trim() || '鞋店系统';
            sysLogo = document.getElementById('set-sys-logo').value.trim() || '👟';
            localStorage.setItem('sec_sys_title', sysTitle);
            localStorage.setItem('sec_sys_logo', sysLogo);
            applyBranding();

            const newPwd = document.getElementById('set-pwd').value;
            if (newPwd !== "") {
                passwordHash = await hashPassword(newPwd);
                localStorage.setItem('sec_pwd_hash', passwordHash);
                showToast("✅ 密码已加密存储！");
                render(); 
            } else if (passwordHash !== "") {
                showConfirm("取消密码", "未输入新密码。确定要取消锁定保护吗？", () => {
                    passwordHash = "";
                    localStorage.setItem('sec_pwd_hash', "");
                    showToast("🔓 密码保护已关闭。");
                    render(); 
                });
            } else {
                showToast("✅ 偏好配置已保存！");
                render();
            }

            // 如果是刚配置好云端，自动拉取一次测试连通性
            if(!wasCloudEnabled && isCloudEnabled) {
                pullFromCloud(true);
            }
        }

        function generateOrderId(dateStr) {
            const parts = dateStr.split('-'); 
            const prefix = parts[0].slice(2) + parts[1] + parts[2]; 
            const todayOrders = orders.filter(o => o.date === dateStr);
            if (todayOrders.length === 0) return prefix + '01'; 
            
            let maxSeq = 0;
            todayOrders.forEach(o => {
                if (o.id && o.id.startsWith(prefix)) {
                    const seqStr = o.id.slice(6); 
                    const seq = parseInt(seqStr, 10);
                    if (!isNaN(seq) && seq > maxSeq) maxSeq = seq;
                }
            });
            return prefix + (maxSeq + 1).toString().padStart(2, '0');
        }

        function saveOrder() {
            const shoe = document.getElementById('f-shoe').value;
            const price = document.getElementById('f-price').value;
            const cost = document.getElementById('f-cost').value;
            if(!shoe || !price || !cost) { showToast("⚠️ 请填写完整的款式和价格信息"); return; }
            
            if (editingOrderId) {
                const index = orders.findIndex(o => o.id === editingOrderId);
                if (index !== -1) {
                    orders[index].staff = document.getElementById('f-staff').value;
                    orders[index].auditor = document.getElementById('f-auditor').value;
                    orders[index].shoe = shoe;
                    orders[index].client = document.getElementById('f-client').value;
                    orders[index].tracking = document.getElementById('f-tracking').value;
                    orders[index].remark = document.getElementById('f-remark').value;
                    orders[index].price = Number(price);
                    orders[index].cost = Number(cost);
                }
            } else {
                const newId = generateOrderId(selectedDate);
                orders.unshift({
                    id: newId, date: selectedDate, 
                    staff: document.getElementById('f-staff').value,
                    auditor: document.getElementById('f-auditor').value,
                    shoe: shoe, client: document.getElementById('f-client').value, 
                    tracking: document.getElementById('f-tracking').value,
                    remark: document.getElementById('f-remark').value,
                    price: Number(price), cost: Number(cost)
                });
            }
            
            localStorage.setItem('sec_orders', JSON.stringify(orders));
            closeModal(); 
            render();
            pushToCloud(); // 触发云同步
            showToast(editingOrderId ? "✏️ 订单修改已保存" : "📦 新订单已入库");
        }

        function deleteOrder(id) {
            showConfirm("删除订单", "确定删除这笔记录吗？此操作不可恢复。", () => {
                orders = orders.filter(o => o.id !== id);
                localStorage.setItem('sec_orders', JSON.stringify(orders));
                render();
                pushToCloud(); // 触发云同步
                showToast("🗑️ 订单已删除");
            });
        }

        function exportExcel() {
            const filtered = orders.filter(o => o.date === selectedDate);
            if (filtered.length === 0) { showToast("⚠️ 当前日期无订单"); return; }
            const ws = XLSX.utils.json_to_sheet(filtered);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "对账单");
            XLSX.writeFile(wb, `${sysTitle}_${selectedDate}.xlsx`);
            showToast("✅ 成功导出");
        }

        function doExportBackup() {
            const data = { orders, passwordHash, staffList, sysTitle, sysLogo, exportDate: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${sysTitle}_离线备份_${new Date().toLocaleDateString()}.json`;
            a.click();
            showToast("💾 离线备份导出成功");
        }

        function doImportBackup(input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if(data.orders) {
                        showConfirm("恢复数据", "导入将覆盖所有数据，确定继续吗？", () => {
                            orders = data.orders;
                            passwordHash = data.passwordHash || "";
                            if (data.staffList) staffList = data.staffList;
                            if (data.sysTitle) sysTitle = data.sysTitle;
                            if (data.sysLogo) sysLogo = data.sysLogo;
                            
                            localStorage.setItem('sec_orders', JSON.stringify(orders));
                            localStorage.setItem('sec_pwd_hash', passwordHash);
                            localStorage.setItem('sec_staff', JSON.stringify(staffList));
                            localStorage.setItem('sec_sys_title', sysTitle);
                            localStorage.setItem('sec_sys_logo', sysLogo);
                            
                            pushToCloud(); // 将导入的本地数据直接覆盖到云端
                            showToast("✅ 数据已恢复，重载系统...");
                            setTimeout(() => location.reload(), 1000);
                        });
                    } else { showToast("⚠️ 备份文件格式错误"); }
                } catch(err) { showToast("⚠️ 解析错误"); }
            };
            reader.readAsText(file);
            input.value = "";
        }

        window.onload = init;
    </script>
</body>
</html>
